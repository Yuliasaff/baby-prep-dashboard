<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Prep Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f5f0eb;
    color: #3a3330;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
    color: #5c4a3a;
  }

  .countdown {
    font-size: 0.95rem;
    color: #9a8a7a;
  }

  .countdown strong {
    color: #5c4a3a;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-bottom: 1.5rem;
    padding: 1.2rem 0;
  }

  .stat {
    text-align: center;
  }

  .stat-number {
    font-size: 2rem;
    font-weight: 700;
    color: #5c4a3a;
    line-height: 1;
  }

  .stat-number.done-num { color: #5a9a70; }
  .stat-number.left-num { color: #c9785c; }

  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9a8a7a;
    margin-top: 0.3rem;
  }

  /* Progress bar */
  .progress-section {
    margin-bottom: 1.8rem;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: #e4dbd2;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c49a6c, #5a9a70);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* Sync bar */
  .sync-bar {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }

  .sync-btn {
    padding: 0.5rem 1.2rem;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .sync-btn.primary {
    background: #5c4a3a;
    color: white;
  }

  .sync-btn.primary:hover {
    background: #4a3a2c;
  }

  .sync-btn.secondary {
    background: #e4dbd2;
    color: #5c4a3a;
  }

  .sync-btn.secondary:hover {
    background: #d9cec3;
  }

  .sync-status {
    font-size: 0.78rem;
    color: #9a8a7a;
    text-align: center;
    margin-bottom: 2rem;
    min-height: 1.2em;
  }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.25rem;
    align-items: start;
  }

  /* Category cards */
  .category {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s ease;
  }

  .category:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.09);
  }

  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    padding: 0.85rem 1rem;
    user-select: none;
  }

  .category-title {
    font-size: 0.92rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .category-count {
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0.6;
  }

  .category-chevron {
    font-size: 0.65rem;
    opacity: 0.5;
    transition: transform 0.2s ease;
  }

  .category.collapsed .category-chevron {
    transform: rotate(-90deg);
  }

  .category.collapsed .task-list {
    display: none;
  }

  .category-right {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .cat-progress {
    width: 40px;
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
  }

  .cat-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Task list */
  .task-list {
    padding: 0 1rem 0.5rem;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    padding: 0.5rem 0;
  }

  .task + .task {
    border-top: 1px solid rgba(0,0,0,0.05);
  }

  .task input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 19px;
    height: 19px;
    min-width: 19px;
    border: 2px solid rgba(0,0,0,0.2);
    border-radius: 5px;
    cursor: pointer;
    margin-top: 1px;
    transition: all 0.2s ease;
    position: relative;
    background: rgba(255,255,255,0.5);
  }

  .task input[type="checkbox"]:hover {
    border-color: rgba(0,0,0,0.35);
  }

  .task input[type="checkbox"]:checked {
    border-color: transparent;
  }

  .task input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 5px;
    width: 5px;
    height: 9px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .task-content {
    flex: 1;
  }

  .task-name {
    font-size: 0.88rem;
    line-height: 1.4;
    transition: all 0.2s ease;
  }

  .task-name a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed rgba(0,0,0,0.2);
    transition: border-color 0.2s;
  }

  .task-name a:hover {
    border-bottom-color: rgba(0,0,0,0.5);
  }

  .task.done .task-name {
    opacity: 0.4;
    text-decoration: line-through;
  }

  .task.done .task-name a {
    border-bottom: none;
  }

  .task-note {
    font-size: 0.75rem;
    opacity: 0.5;
    margin-top: 0.1rem;
    line-height: 1.3;
  }

  .task.done .task-note {
    opacity: 0.25;
  }

  .task-link {
    font-size: 0.72rem;
    margin-top: 0.2rem;
  }

  .task-link a {
    color: #8a7a6a;
    text-decoration: none;
    border-bottom: 1px dashed #c0b0a0;
    transition: all 0.2s;
  }

  .task-link a:hover {
    color: #5c4a3a;
    border-bottom-color: #5c4a3a;
  }

  .task.done .task-link a {
    opacity: 0.3;
  }

  /* Color themes for categories */
  .cat-medical { background: #fdf2f0; }
  .cat-medical .category-header { color: #9b4d3a; }
  .cat-medical .cat-progress { background: #f5d5cf; }
  .cat-medical .cat-progress-fill { background: #c96b55; }
  .cat-medical input[type="checkbox"]:checked { background: #c96b55; }

  .cat-birth { background: #fdf5ee; }
  .cat-birth .category-header { color: #8a6530; }
  .cat-birth .cat-progress { background: #f0dfc5; }
  .cat-birth .cat-progress-fill { background: #c49a5c; }
  .cat-birth input[type="checkbox"]:checked { background: #c49a5c; }

  .cat-gear { background: #eef5f3; }
  .cat-gear .category-header { color: #3a6b5e; }
  .cat-gear .cat-progress { background: #c8e0d8; }
  .cat-gear .cat-progress-fill { background: #5a9a85; }
  .cat-gear input[type="checkbox"]:checked { background: #5a9a85; }

  .cat-home { background: #f0f0fa; }
  .cat-home .category-header { color: #4a4a7a; }
  .cat-home .cat-progress { background: #d0d0e8; }
  .cat-home .cat-progress-fill { background: #7070a8; }
  .cat-home input[type="checkbox"]:checked { background: #7070a8; }

  .cat-bag { background: #fdf0f5; }
  .cat-bag .category-header { color: #8a3a5e; }
  .cat-bag .cat-progress { background: #f0c8d8; }
  .cat-bag .cat-progress-fill { background: #b85a80; }
  .cat-bag input[type="checkbox"]:checked { background: #b85a80; }

  .cat-admin { background: #f0f5ee; }
  .cat-admin .category-header { color: #4a6b3a; }
  .cat-admin .cat-progress { background: #c8e0c0; }
  .cat-admin .cat-progress-fill { background: #6a9a55; }
  .cat-admin input[type="checkbox"]:checked { background: #6a9a55; }

  .cat-postpartum { background: #f5f0ee; }
  .cat-postpartum .category-header { color: #6b5a4a; }
  .cat-postpartum .cat-progress { background: #e0d0c0; }
  .cat-postpartum .cat-progress-fill { background: #9a7a5a; }
  .cat-postpartum input[type="checkbox"]:checked { background: #9a7a5a; }

  /* Footer */
  footer {
    text-align: center;
    padding: 2.5rem 0 1rem;
    font-size: 0.78rem;
    color: #bfb0a0;
  }

  /* Responsive */
  @media (max-width: 700px) {
    body { padding: 1.5rem 1rem; }
    header h1 { font-size: 1.4rem; }
    .grid { grid-template-columns: 1fr; }
    .stats-row { gap: 1.5rem; }
    .stat-number { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Baby Prep</h1>
    <div class="countdown">
      Due <strong>May 27</strong> &mdash; <span id="days-left"></span> days to go
    </div>
  </header>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-number" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-number done-num" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-number left-num" id="stat-left">0</div>
      <div class="stat-label">Left</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-bar">
      <div class="progress-fill" id="total-fill" style="width: 0%"></div>
    </div>
  </div>

  <div class="sync-bar">
    <button class="sync-btn primary" onclick="shareState()">Share progress</button>
    <button class="sync-btn secondary" onclick="loadShared()">Load shared</button>
  </div>
  <div class="sync-status" id="sync-status"></div>

  <div class="grid" id="categories"></div>

  <footer>Use "Share progress" to sync with your partner</footer>
</div>

<script>
const DUE_DATE = new Date('2026-05-27');
const JSONBIN_API = 'https://api.jsonbin.io/v3/b';

const CAT_CLASSES = ['cat-medical','cat-birth','cat-gear','cat-home','cat-bag','cat-admin','cat-postpartum'];

const DATA = [
  {
    title: "Medical",
    tasks: [
      { id: "med-1", name: "Schedule remaining OB check-ups", note: "Weekly visits usually start around week 36" },
      { id: "med-2", name: "Choose a pediatrician", note: "For the newborn's first check-up" },
      { id: "med-3", name: "Discuss birth plan with OB", note: "Natural birth after C-section — confirm hospital is on board" },
      { id: "med-4", name: "Pre-register at the hospital", note: "Speeds up admission day-of" },
      { id: "med-5", name: "Group B Strep test", note: "Usually done around weeks 36-37" },
      { id: "med-6", name: "Pack prescriptions & medical docs", note: "Insurance card, ID, any prenatal records" },
    ]
  },
  {
    title: "Birth Preparation",
    tasks: [
      { id: "birth-1", name: "Watch natural birth videos / course", note: "Look into positive birth stories, breathing techniques" },
      { id: "birth-2", name: "Learn about VBAC specifics", note: "What to expect when delivering naturally after a C-section" },
      { id: "birth-3", name: "Practice breathing & relaxation techniques", note: "Helps manage contractions" },
      { id: "birth-4", name: "Discuss pain management options with OB", note: "Epidural availability, other options" },
      { id: "birth-5", name: "Know the signs of labor", note: "When to go to the hospital vs. early labor at home" },
    ]
  },
  {
    title: "Baby Gear",
    tasks: [
      { id: "gear-1", name: "Car seat", note: "Already bought — no installation needed (no car)", link: "" },
      { id: "gear-2", name: "Crib / bassinet", note: "With fitted sheets, no loose bedding", link: "https://www.amazon.com/s?k=baby+bassinet" },
      { id: "gear-3", name: "Stroller", note: "Compatible with car seat is a plus", link: "https://www.amazon.com/s?k=baby+stroller" },
      { id: "gear-4", name: "Diapers & wipes (newborn size)", note: "Stock up — you'll go through a lot", link: "https://www.amazon.com/s?k=newborn+diapers" },
      { id: "gear-5", name: "Baby clothes (newborn + 0-3 months)", note: "Onesies, sleepsuits, hats, socks", link: "https://www.amazon.com/s?k=newborn+baby+clothes" },
      { id: "gear-6", name: "Swaddles / sleep sacks", note: "", link: "https://www.amazon.com/s?k=baby+swaddle+sleep+sack" },
      { id: "gear-7", name: "Bottles & formula (backup)", note: "Even if breastfeeding, good to have on hand", link: "https://www.amazon.com/s?k=newborn+bottles" },
      { id: "gear-8", name: "Breast pump", note: "Check if insurance covers it", link: "https://www.amazon.com/s?k=breast+pump" },
      { id: "gear-9", name: "Baby bath tub", note: "", link: "https://www.amazon.com/s?k=baby+bath+tub" },
      { id: "gear-10", name: "Baby monitor", note: "", link: "https://www.amazon.com/s?k=baby+monitor" },
    ]
  },
  {
    title: "Nursery / Home",
    tasks: [
      { id: "home-1", name: "Set up sleeping area", note: "Crib, sheets, blackout curtains" },
      { id: "home-2", name: "Changing station ready", note: "Changing pad, diapers, wipes, cream within reach" },
      { id: "home-3", name: "Wash baby clothes & bedding", note: "Use fragrance-free detergent" },
      { id: "home-4", name: "Stock up on household essentials", note: "Toilet paper, cleaning supplies, laundry detergent" },
    ]
  },
  {
    title: "Hospital Bag",
    tasks: [
      { id: "bag-1", name: "Comfortable clothes for labor", note: "Something you don't mind getting messy" },
      { id: "bag-2", name: "Going-home outfit for you", note: "Comfortable, loose-fitting" },
      { id: "bag-3", name: "Going-home outfit for baby", note: "Plus a blanket" },
      { id: "bag-4", name: "Phone charger (long cable)", note: "" },
      { id: "bag-5", name: "Toiletries & personal comfort items", note: "Lip balm, hair ties, slippers" },
    ]
  },
  {
    title: "Admin & Logistics",
    tasks: [
      { id: "admin-1", name: "Review insurance / birth coverage", note: "Understand what's covered at your hospital" },
      { id: "admin-2", name: "Plan for older child's care during labor", note: "Who will watch them when the time comes?" },
      { id: "admin-3", name: "Prepare birth registration documents", note: "Research what's needed in your country" },
      { id: "admin-4", name: "Discuss parental leave / time off work", note: "" },
      { id: "admin-5", name: "Decide on baby's name", note: "Or at least a shortlist!" },
      { id: "admin-6", name: "Set up help for the first weeks", note: "Family, postpartum doula, or meal delivery" },
    ]
  },
  {
    title: "Postpartum Prep",
    tasks: [
      { id: "post-1", name: "Recovery supplies for you", note: "Pads, comfortable underwear, nipple cream" },
      { id: "post-2", name: "Nursing pillow (if breastfeeding)", note: "", link: "https://www.amazon.com/s?k=nursing+pillow" },
      { id: "post-3", name: "Snacks & easy meals stocked", note: "Granola bars, nuts, quick meals for late nights" },
      { id: "post-4", name: "Know your pediatrician's after-hours number", note: "For peace of mind those first nights" },
    ]
  },
];

// State management
function loadState() {
  try {
    return JSON.parse(localStorage.getItem('baby-prep-state') || '{}');
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem('baby-prep-state', JSON.stringify(state));
}

function getBinId() {
  return localStorage.getItem('baby-prep-bin-id') || null;
}

function setBinId(id) {
  localStorage.setItem('baby-prep-bin-id', id);
}

// Sync functions
function showStatus(msg, duration) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  if (duration) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, duration);
}

async function shareState() {
  const state = loadState();
  const shareData = {};
  for (const [k, v] of Object.entries(state)) {
    if (!k.startsWith('_')) shareData[k] = v;
  }

  try {
    const binId = getBinId();
    if (binId) {
      const res = await fetch(JSONBIN_API + '/' + binId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(shareData)
      });
      if (!res.ok) throw new Error('Update failed');
      const shareUrl = window.location.href.split('?')[0].split('#')[0] + '?bin=' + binId;
      await copyToClipboard(shareUrl);
      showStatus('Link copied! Share it with your partner.', 5000);
    } else {
      const res = await fetch(JSONBIN_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(shareData)
      });
      if (!res.ok) throw new Error('Create failed');
      const data = await res.json();
      const newBinId = data.metadata.id;
      setBinId(newBinId);
      const shareUrl = window.location.href.split('?')[0].split('#')[0] + '?bin=' + newBinId;
      await copyToClipboard(shareUrl);
      showStatus('Link copied! Share it with your partner.', 5000);
    }
  } catch (err) {
    const encoded = btoa(JSON.stringify(shareData));
    const shareUrl = window.location.href.split('?')[0].split('#')[0] + '#state=' + encoded;
    await copyToClipboard(shareUrl);
    showStatus('Link copied! Share it with your partner.', 5000);
  }
}

async function loadShared() {
  const binId = getBinId();
  if (!binId) {
    showStatus('No shared dashboard linked yet. Open a shared link first.', 4000);
    return;
  }

  try {
    showStatus('Loading latest...');
    const res = await fetch(JSONBIN_API + '/' + binId + '/latest');
    if (!res.ok) throw new Error('Load failed');
    const data = await res.json();
    const remoteState = data.record;

    const localState = loadState();
    const merged = {};
    for (const [k, v] of Object.entries(localState)) {
      if (k.startsWith('_')) merged[k] = v;
    }
    for (const [k, v] of Object.entries(remoteState)) {
      merged[k] = v;
    }

    saveState(merged);
    render();
    showStatus('Synced!', 3000);
  } catch {
    showStatus('Could not load shared data. Try again.', 4000);
  }
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

function checkUrlForSharedState() {
  const params = new URLSearchParams(window.location.search);
  const binId = params.get('bin');
  if (binId) {
    setBinId(binId);
    loadShared();
    window.history.replaceState({}, '', window.location.pathname);
    return;
  }

  const hash = window.location.hash;
  if (hash.startsWith('#state=')) {
    try {
      const decoded = JSON.parse(atob(hash.slice(7)));
      const localState = loadState();
      const merged = {};
      for (const [k, v] of Object.entries(localState)) {
        if (k.startsWith('_')) merged[k] = v;
      }
      for (const [k, v] of Object.entries(decoded)) {
        merged[k] = v;
      }
      saveState(merged);
      render();
      window.history.replaceState({}, '', window.location.pathname);
      showStatus('Loaded shared progress!', 3000);
    } catch {}
  }
}

// Countdown
function updateCountdown() {
  const now = new Date();
  const diff = Math.ceil((DUE_DATE - now) / (1000 * 60 * 60 * 24));
  document.getElementById('days-left').textContent = diff > 0 ? diff : 0;
}

// Render
function render() {
  const state = loadState();
  const container = document.getElementById('categories');
  container.innerHTML = '';

  let totalTasks = 0;
  let totalDone = 0;

  DATA.forEach((cat, catIdx) => {
    const doneTasks = cat.tasks.filter(t => state[t.id]).length;
    totalTasks += cat.tasks.length;
    totalDone += doneTasks;

    const catEl = document.createElement('div');
    catEl.className = 'category ' + CAT_CLASSES[catIdx] + (state['_collapsed_' + catIdx] ? ' collapsed' : '');

    const pct = cat.tasks.length ? Math.round((doneTasks / cat.tasks.length) * 100) : 0;

    catEl.innerHTML = `
      <div class="category-header" data-cat="${catIdx}">
        <div class="category-title">
          ${cat.title}
          <span class="category-count">${doneTasks}/${cat.tasks.length}</span>
        </div>
        <div class="category-right">
          <div class="cat-progress"><div class="cat-progress-fill" style="width:${pct}%"></div></div>
          <span class="category-chevron">&#9660;</span>
        </div>
      </div>
      <div class="task-list">
        ${cat.tasks.map(t => `
          <div class="task ${state[t.id] ? 'done' : ''}">
            <input type="checkbox" ${state[t.id] ? 'checked' : ''} data-id="${t.id}">
            <div class="task-content">
              <div class="task-name">${t.name}</div>
              ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
              ${t.link ? `<div class="task-link"><a href="${t.link}" target="_blank" rel="noopener">Search on Amazon &rarr;</a></div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;

    container.appendChild(catEl);
  });

  // Stats
  document.getElementById('stat-total').textContent = totalTasks;
  document.getElementById('stat-done').textContent = totalDone;
  document.getElementById('stat-left').textContent = totalTasks - totalDone;

  // Progress
  const totalPct = totalTasks ? Math.round((totalDone / totalTasks) * 100) : 0;
  document.getElementById('total-fill').style.width = totalPct + '%';
}

// Events
document.addEventListener('change', e => {
  if (e.target.type === 'checkbox' && e.target.dataset.id) {
    const state = loadState();
    state[e.target.dataset.id] = e.target.checked;
    saveState(state);
    render();
  }
});

document.addEventListener('click', e => {
  const header = e.target.closest('.category-header');
  if (header) {
    const catIdx = header.dataset.cat;
    const state = loadState();
    state['_collapsed_' + catIdx] = !state['_collapsed_' + catIdx];
    saveState(state);
    render();
  }
});

updateCountdown();
render();
checkUrlForSharedState();
</script>
</body>
</html>
