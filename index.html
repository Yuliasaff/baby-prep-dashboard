<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Prep Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f5f0eb;
    color: #3a3330;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 1.5rem; }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
    color: #5c4a3a;
  }

  .countdown { font-size: 0.95rem; color: #9a8a7a; }
  .countdown strong { color: #5c4a3a; }

  /* Sync indicator */
  .sync-indicator {
    text-align: center;
    font-size: 0.75rem;
    color: #b0a090;
    margin-bottom: 1rem;
    min-height: 1em;
  }
  .sync-indicator.synced { color: #5a9a70; }
  .sync-indicator.error { color: #c96b55; }

  /* Stats row */
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-bottom: 1.5rem;
    padding: 1.2rem 0;
  }

  .stat { text-align: center; }

  .stat-number {
    font-size: 2rem;
    font-weight: 700;
    color: #5c4a3a;
    line-height: 1;
  }

  .stat-number.done-num { color: #5a9a70; }
  .stat-number.left-num { color: #c9785c; }

  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9a8a7a;
    margin-top: 0.3rem;
  }

  /* Progress bar */
  .progress-section {
    margin-bottom: 2rem;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: #e4dbd2;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c49a6c, #5a9a70);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.25rem;
    align-items: start;
  }

  /* Category cards */
  .category {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s ease;
  }

  .category:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.09); }

  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    padding: 0.85rem 1rem;
    user-select: none;
  }

  .category-title {
    font-size: 0.92rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .category-count { font-size: 0.75rem; font-weight: 500; opacity: 0.6; }

  .category-chevron {
    font-size: 0.65rem;
    opacity: 0.5;
    transition: transform 0.2s ease;
  }

  .category.collapsed .category-chevron { transform: rotate(-90deg); }
  .category.collapsed .task-list { display: none; }
  .category.collapsed .add-task-row { display: none; }

  .category-right { display: flex; align-items: center; gap: 0.6rem; }

  .cat-progress { width: 40px; height: 4px; border-radius: 2px; overflow: hidden; }

  .cat-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Task list */
  .task-list { padding: 0 1rem 0; }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    padding: 0.5rem 0;
    position: relative;
  }

  .task + .task { border-top: 1px solid rgba(0,0,0,0.05); }

  .task input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 19px;
    height: 19px;
    min-width: 19px;
    border: 2px solid rgba(0,0,0,0.2);
    border-radius: 5px;
    cursor: pointer;
    margin-top: 1px;
    transition: all 0.2s ease;
    position: relative;
    background: rgba(255,255,255,0.5);
  }

  .task input[type="checkbox"]:hover { border-color: rgba(0,0,0,0.35); }
  .task input[type="checkbox"]:checked { border-color: transparent; }

  .task input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 5px;
    width: 5px;
    height: 9px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .task-content { flex: 1; min-width: 0; }

  .task-name {
    font-size: 0.88rem;
    line-height: 1.4;
    transition: all 0.2s ease;
  }

  .task.done .task-name { opacity: 0.4; text-decoration: line-through; }

  .task-note {
    font-size: 0.75rem;
    opacity: 0.5;
    margin-top: 0.1rem;
    line-height: 1.3;
  }

  .task.done .task-note { opacity: 0.25; }

  .task-link {
    font-size: 0.72rem;
    margin-top: 0.2rem;
  }

  .task-link a {
    color: #8a7a6a;
    text-decoration: none;
    border-bottom: 1px dashed #c0b0a0;
    transition: all 0.2s;
  }

  .task-link a:hover { color: #5c4a3a; border-bottom-color: #5c4a3a; }
  .task.done .task-link a { opacity: 0.3; }

  /* Task actions */
  .task-actions {
    display: flex;
    gap: 0.25rem;
    opacity: 0;
    transition: opacity 0.15s;
    margin-top: 2px;
  }

  .task:hover .task-actions { opacity: 1; }

  .task-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    color: #9a8a7a;
    transition: all 0.15s;
    font-family: inherit;
  }

  .task-btn:hover { background: rgba(0,0,0,0.06); color: #5c4a3a; }
  .task-btn.delete:hover { background: rgba(200,80,60,0.1); color: #c85040; }

  /* Add task row */
  .add-task-row {
    padding: 0.4rem 1rem 0.7rem;
  }

  .add-task-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.8rem;
    color: #b0a090;
    padding: 0.3rem 0;
    font-family: inherit;
    transition: color 0.15s;
  }

  .add-task-btn:hover { color: #5c4a3a; }

  /* Edit modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 14px;
    padding: 1.5rem;
    width: 90%;
    max-width: 440px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }

  .modal h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: #5c4a3a;
  }

  .modal label {
    display: block;
    font-size: 0.78rem;
    color: #9a8a7a;
    margin-bottom: 0.25rem;
    margin-top: 0.75rem;
  }

  .modal label:first-of-type { margin-top: 0; }

  .modal input[type="text"],
  .modal input[type="url"] {
    width: 100%;
    padding: 0.5rem 0.65rem;
    border: 1px solid #e0d8d0;
    border-radius: 8px;
    font-size: 0.88rem;
    font-family: inherit;
    color: #3a3330;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: #c49a6c; }

  .modal-buttons {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
    margin-top: 1.25rem;
  }

  .modal-btn {
    padding: 0.5rem 1.1rem;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .modal-btn.save { background: #5c4a3a; color: white; }
  .modal-btn.save:hover { background: #4a3a2c; }
  .modal-btn.cancel { background: #e4dbd2; color: #5c4a3a; }
  .modal-btn.cancel:hover { background: #d9cec3; }

  /* Color themes for categories */
  .cat-0 { background: #fdf2f0; }
  .cat-0 .category-header { color: #9b4d3a; }
  .cat-0 .cat-progress { background: #f5d5cf; }
  .cat-0 .cat-progress-fill { background: #c96b55; }
  .cat-0 input[type="checkbox"]:checked { background: #c96b55; }

  .cat-1 { background: #fdf5ee; }

  .cat-1 .cat-progress-fill { background: #c49a5c; }
  .cat-1 input[type="checkbox"]:checked { background: #c49a5c; }

  .cat-2 { background: #eef5f3; }

  .cat-2 .cat-progress { background: #c8e0d8; }
  .cat-2 .cat-progress-fill { background: #5a9a85; }
  .cat-2 input[type="checkbox"]:checked { background: #5a9a85; }

  .cat-3 { background: #f0f0fa; }
  .cat-3 .category-header { color: #4a4a7a; }
  .cat-3 .cat-progress { background: #d0d0e8; }
  .cat-3 .cat-progress-fill { background: #7070a8; }
  .cat-3 input[type="checkbox"]:checked { background: #7070a8; }

  .cat-4 .cat-progress { background: #f0c8d8; }
  .cat-4 .cat-progress-fill { background: #b85a80; }
  .cat-4 input[type="checkbox"]:checked { background: #b85a80; }

  .cat-5 { background: #f0f5ee; }
  .cat-5 .category-header { color: #4a6b3a; }
  .cat-5 .cat-progress { background: #c8e0c0; }
  .cat-5 .cat-progress-fill { background: #6a9a55; }
  .cat-5 input[type="checkbox"]:checked { background: #6a9a55; }

  .cat-6 { background: #f5f0ee; }
  .cat-6 .category-header { color: #6b5a4a; }
  .cat-6 .cat-progress { background: #e0d0c0; }
  .cat-6 .cat-progress-fill { background: #9a7a5a; }
  .cat-6 input[type="checkbox"]:checked { background: #9a7a5a; }

  .cat-7 { background: #eef2f5; }
  .cat-7 .category-header { color: #3a5a6b; }
  .cat-7 .cat-progress { background: #c0d8e0; }
  .cat-7 .cat-progress-fill { background: #5a8a9a; }
  .cat-7 input[type="checkbox"]:checked { background: #5a8a9a; }

  footer {
    text-align: center;
    padding: 2.5rem 0 1rem;
    font-size: 0.78rem;
    color: #bfb0a0;
  }

  @media (max-width: 740px) {
    body { padding: 1.5rem 1rem; }
    header h1 { font-size: 1.4rem; }
    .grid { grid-template-columns: 1fr; }
    .stats-row { gap: 1.5rem; }
    .stat-number { font-size: 1.5rem; }
    .task-actions { opacity: 1; }
  }
</style>
</head>

<div class="container">

    </div>

      <div class="stat-label">Done</div>

    <div class="stat">

  <div class="progress-section">

  <div class="grid" id="categories"></div>

  <footer>Synced in real-time &middot; Changes appear on all devices</footer>
</div>

<!-- Edit / Add modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Edit item</h3>
    <label for="edit-name">Item name</label>
    <input type="text" id="edit-name" placeholder="What needs to be done?">
    <label for="edit-note">Note (optional)</label>
    <input type="text" id="edit-note" placeholder="Extra details...">
    <label for="edit-link">Link (optional)</label>
    <input type="url" id="edit-link" placeholder="https://...">
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

// ─── State management via localStorage + cloud sync ───
const STORAGE_KEY = 'baby-prep-data-v2';
const SYNC_KEY = 'baby-prep-sync-id';

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  syncToCloud(data);
}

let data = loadData();
let uiState = loadUiState();

function loadUiState() {
  try {
    return JSON.parse(localStorage.getItem('baby-prep-ui') || '{}');
  } catch { return {}; }
}

function saveUiState() {
  localStorage.setItem('baby-prep-ui', JSON.stringify(uiState));
}

// ─── Cloud sync via JSONBin (free, no auth needed) ───
const JSONBIN_API = 'https://api.jsonbin.io/v3/b';
let syncTimeout = null;

function getSyncId() {
  // Check URL first
  const params = new URLSearchParams(window.location.search);
  const urlId = params.get('sync');
  if (urlId) {
    localStorage.setItem(SYNC_KEY, urlId);
    window.history.replaceState({}, '', window.location.pathname);
    return urlId;
  }
  return localStorage.getItem(SYNC_KEY) || null;
}

function setSyncId(id) {
  localStorage.setItem(SYNC_KEY, id);
}

async function syncToCloud(data) {
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(async () => {
    try {
      const syncId = getSyncId();
      if (syncId) {
        await fetch(JSONBIN_API + '/' + syncId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data, updated: Date.now() })
        });
      } else {
        const res = await fetch(JSONBIN_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data, updated: Date.now() })
        });
        if (res.ok) {
          const result = await res.json();
          setSyncId(result.metadata.id);
        }
      }
      showSync('Saved', 'synced');
    } catch {
      showSync('Saved locally', '');
    }
  }, 800);
}

async function loadFromCloud() {
  const syncId = getSyncId();
  if (!syncId) return false;
  try {
    showSync('Syncing...', '');
    const res = await fetch(JSONBIN_API + '/' + syncId + '/latest');
    if (!res.ok) return false;
    const result = await res.json();
    if (result.record && result.record.data) {
      data = result.record.data;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
      showSync('Synced', 'synced');
      return true;
    }
  } catch {}
  return false;
}

function getShareUrl() {
  const syncId = getSyncId();
  if (!syncId) return null;
  return window.location.origin + window.location.pathname + '?sync=' + syncId;
}

function showSync(msg, cls) {
  const el = document.getElementById('sync-indicator');
  el.textContent = msg;
  el.className = 'sync-indicator ' + cls;
}

// ─── Countdown ───
function updateCountdown() {
  const now = new Date();
  const diff = Math.ceil((new Date('2026-05-27') - now) / (1000 * 60 * 60 * 24));
  document.getElementById('days-left').textContent = diff > 0 ? diff : 0;
}

// ─── Modal ───
let modalMode = null; // { action: 'edit'|'add', catIdx, taskIdx }

function openModal(mode) {
  modalMode = mode;
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const nameInput = document.getElementById('edit-name');
  const noteInput = document.getElementById('edit-note');
  const linkInput = document.getElementById('edit-link');

  if (mode.action === 'edit') {
    title.textContent = 'Edit item';
    const task = data[mode.catIdx].tasks[mode.taskIdx];
    nameInput.value = task.name;
    noteInput.value = task.note || '';
    linkInput.value = task.link || '';
  } else {
    title.textContent = 'Add item';
    nameInput.value = '';
    noteInput.value = '';
    linkInput.value = '';
  }

  modal.classList.add('open');
  nameInput.focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalMode = null;
}

function saveModal() {
  const name = document.getElementById('edit-name').value.trim();
  if (!name) return;
  const note = document.getElementById('edit-note').value.trim();
  const link = document.getElementById('edit-link').value.trim();

  if (modalMode.action === 'edit') {
    const task = data[modalMode.catIdx].tasks[modalMode.taskIdx];
    task.name = name;
    task.note = note;
    task.link = link;
  } else {
    const catTasks = data[modalMode.catIdx].tasks;
    const newId = 'custom-' + Date.now();
    catTasks.push({ id: newId, name, note, link, done: false });
  }

  saveData(data);
  render();
  closeModal();
}

function deleteTask(catIdx, taskIdx) {
  const task = data[catIdx].tasks[taskIdx];
  if (!confirm('Delete "' + task.name + '"?')) return;
  data[catIdx].tasks.splice(taskIdx, 1);
  saveData(data);
  render();
}

// ─── Render ───
function render() {
  const container = document.getElementById('categories');
  container.innerHTML = '';

  let totalTasks = 0;
  let totalDone = 0;

  data.forEach((cat, catIdx) => {
    const doneTasks = cat.tasks.filter(t => t.done).length;
    totalTasks += cat.tasks.length;
    totalDone += doneTasks;

    const catEl = document.createElement('div');
    const collapsed = uiState['col_' + catIdx];
    catEl.className = 'category cat-' + catIdx + (collapsed ? ' collapsed' : '');

    const pct = cat.tasks.length ? Math.round((doneTasks / cat.tasks.length) * 100) : 0;

    catEl.innerHTML = `
      <div class="category-header" data-cat="${catIdx}">
        <div class="category-title">
          ${cat.title}
          <span class="category-count">${doneTasks}/${cat.tasks.length}</span>
        </div>
        <div class="category-right">
          <div class="cat-progress"><div class="cat-progress-fill" style="width:${pct}%"></div></div>
          <span class="category-chevron">&#9660;</span>
        </div>
      </div>
      <div class="task-list">
        ${cat.tasks.map((t, tIdx) => `
          <div class="task ${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} data-cat="${catIdx}" data-task="${tIdx}">
            <div class="task-content">
              <div class="task-name">${t.name}</div>
              ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
              ${t.link ? `<div class="task-link"><a href="${t.link}" target="_blank" rel="noopener">Buy &rarr;</a></div>` : ''}
            </div>
            <div class="task-actions">
              <button class="task-btn" onclick="openModal({action:'edit',catIdx:${catIdx},taskIdx:${tIdx}})">edit</button>
              <button class="task-btn delete" onclick="deleteTask(${catIdx},${tIdx})">delete</button>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="add-task-row">
        <button class="add-task-btn" onclick="openModal({action:'add',catIdx:${catIdx}})">+ Add item</button>
      </div>
    `;

    container.appendChild(catEl);
  });

  document.getElementById('stat-total').textContent = totalTasks;
  document.getElementById('stat-done').textContent = totalDone;
  document.getElementById('stat-left').textContent = totalTasks - totalDone;

  const totalPct = totalTasks ? Math.round((totalDone / totalTasks) * 100) : 0;
  document.getElementById('total-fill').style.width = totalPct + '%';
}

// ─── Events ───
document.addEventListener('change', e => {
  if (e.target.type === 'checkbox' && e.target.dataset.cat !== undefined) {
    const catIdx = parseInt(e.target.dataset.cat);
    const taskIdx = parseInt(e.target.dataset.task);
    data[catIdx].tasks[taskIdx].done = e.target.checked;
    saveData(data);
    render();
  }
});

document.addEventListener('click', e => {
  const header = e.target.closest('.category-header');
  if (header) {
    const catIdx = header.dataset.cat;
    uiState['col_' + catIdx] = !uiState['col_' + catIdx];
    saveUiState();
    render();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) saveModal();
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ─── Init ───
updateCountdown();
render();

// Initial cloud sync
(async () => {
  const syncId = getSyncId();
  if (syncId) {
    await loadFromCloud();
  } else {
    // First time — push to cloud
    syncToCloud(data);
  }

  // Poll for updates every 30 seconds
  setInterval(async () => {
    const id = getSyncId();
    if (id) {
      try {
        const res = await fetch(JSONBIN_API + '/' + id + '/latest');
        if (res.ok) {
          const result = await res.json();
          if (result.record && result.record.data) {
            const remoteUpdated = result.record.updated || 0;
            data = result.record.data;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            render();
          }
        }
      } catch {}
    }
  }, 30000);
})();
</script>
